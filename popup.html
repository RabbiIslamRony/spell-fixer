<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Spell Fixer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      width: 230px;
      background: #fff;
      color: #1e293b;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 14px 11px;
      border-bottom: 1px solid #f1f5f9;
    }

    .logo {
      width: 26px;
      height: 26px;
      background: #E24B4A;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { display: block; }

    .title {
      font-weight: 700;
      font-size: 14px;
      color: #0f172a;
      letter-spacing: -0.01em;
    }

    /* ── Body ── */
    .body { padding: 12px 14px 14px; }

    /* ── Toggle row ── */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .row-label {
      font-size: 13px;
      color: #334155;
    }

    /* ── Switch ── */
    .switch {
      position: relative;
      width: 40px;
      height: 23px;
      flex-shrink: 0;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .track {
      position: absolute;
      inset: 0;
      background: #cbd5e1;
      border-radius: 23px;
      cursor: pointer;
      transition: background 0.18s;
    }

    .track::after {
      content: '';
      position: absolute;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      left: 3px;
      transition: transform 0.18s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }

    .switch input:checked + .track { background: #E24B4A; }
    .switch input:checked + .track::after { transform: translateX(17px); }

    .switch input:focus-visible + .track {
      outline: 2px solid #E24B4A;
      outline-offset: 2px;
    }

    /* ── Row divider ── */
    .row-divider {
      height: 1px;
      background: #f1f5f9;
      margin: 10px 0;
    }

    /* ── Site toggle button ── */
    .site-btn {
      padding: 4px 11px;
      border-radius: 5px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .site-btn:hover { background: #f1f5f9; }

    .site-btn.enabled-btn {
      background: #E24B4A;
      color: #fff;
      border-color: #E24B4A;
    }

    .site-btn.enabled-btn:hover { background: #c73938; }

    /* ── Dictionary row ── */
    .dict-btns { display: flex; gap: 6px; }

    .dict-btn {
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      cursor: pointer;
      transition: background 0.15s;
    }

    .dict-btn:hover { background: #f1f5f9; }

    /* ── Status bar ── */
    .status {
      margin-top: 10px;
      padding: 7px 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 12px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .status-dot.off { background: #94a3b8; }

    #sf-status-text {
      line-height: 1.3;
    }

    /* ── Color row ── */
    .color-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .color-swatches {
      display: flex;
      gap: 6px;
    }

    .sf-color-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
    }

    .sf-color-btn.active {
      border-color: #0f172a;
    }

    .sf-color-btn:focus-visible {
      outline: 2px solid #0284c7;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo" aria-hidden="true">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="1" y="11" font-family="Georgia, serif" font-size="10"
              font-weight="bold" fill="white">ab</text>
        <line x1="1" y1="14" x2="14" y2="14" stroke="white"
              stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="title">Spell Fixer</span>
  </div>

  <div class="body">
    <div class="row">
      <span class="row-label">Enable spell check</span>
      <label class="switch" aria-label="Toggle spell check">
        <input type="checkbox" id="sf-toggle" checked>
        <span class="track"></span>
      </label>
    </div>

    <div class="row-divider"></div>

    <div class="row">
      <span class="row-label">Auto-correct typos</span>
      <label class="switch" aria-label="Toggle auto-correct">
        <input type="checkbox" id="sf-autocorrect" checked>
        <span class="track"></span>
      </label>
    </div>

    <div class="row-divider"></div>

    <div class="row" id="sf-site-row">
      <span class="row-label">Disable on this site</span>
      <button id="sf-site-btn" class="site-btn" type="button">Disable</button>
    </div>

    <div class="row-divider"></div>

    <div class="row">
      <span class="row-label">Custom words: <span id="sf-word-count">0</span></span>
      <div class="dict-btns">
        <button id="sf-export-btn" class="dict-btn" type="button">Export</button>
        <button id="sf-import-btn" class="dict-btn" type="button">Import</button>
        <input type="file" id="sf-import-file" accept=".json" style="display:none">
      </div>
    </div>

    <div class="row-divider"></div>

    <div class="color-row">
      <span class="row-label">Underline color</span>
      <div class="color-swatches">
        <button class="sf-color-btn" type="button" data-color="#E24B4A" style="background:#E24B4A" aria-label="Red"></button>
        <button class="sf-color-btn" type="button" data-color="#2563eb" style="background:#2563eb" aria-label="Blue"></button>
        <button class="sf-color-btn" type="button" data-color="#f97316" style="background:#f97316" aria-label="Orange"></button>
        <button class="sf-color-btn" type="button" data-color="#16a34a" style="background:#16a34a" aria-label="Green"></button>
      </div>
    </div>

    <div class="status">
      <span class="status-dot" id="sf-dot"></span>
      <span id="sf-status-text">Active on this page</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
